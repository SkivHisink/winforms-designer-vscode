name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build engine (Release)
        run: dotnet build engine -c Release

      - name: Build sample fixtures
        run: |
          dotnet build samples/CustomControls -c Release
          dotnet build samples/ComplexProject -f net9.0-windows -c Debug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Typecheck
        working-directory: extension
        run: npm run typecheck

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: End-to-end (headless)
        working-directory: extension
        run: npm run e2e

      - name: Live-webview tests (headless jsdom)
        working-directory: extension
        run: npm run webview-e2e

      # Runs `vscode:prepublish` (build + bundle the engine into extension/engine/ + copy LICENSE).
      - name: Package VSIX
        working-directory: extension
        run: npx --yes @vscode/vsce package --no-dependencies -o winforms-designer.vsix

      - name: Assert VSIX contains the bundled engine
        working-directory: extension
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\winforms-designer.vsix")
          $names = $zip.Entries.FullName
          $zip.Dispose()
          $required = @(
            'extension/engine/WinFormsDesigner.Engine.dll',
            'extension/engine/WinFormsDesigner.Engine.deps.json',
            'extension/engine/WinFormsDesigner.Engine.runtimeconfig.json',
            'extension/engine-net48/WinFormsDesigner.Engine.Net48.exe'
          )
          $missing = @()
          foreach ($r in $required) {
            if ($names -notcontains $r) { $missing += $r }
          }
          if ($missing.Count -gt 0) {
            Write-Error ("VSIX is missing required engine files: " + ($missing -join ', '))
            exit 1
          }
          Write-Host "VSIX contains the bundled engine."

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: winforms-designer-vsix
          path: extension/*.vsix
          if-no-files-found: error

      # The publish/release steps only run for a real tag push (v*).

      # Curated body = the matching version section from CHANGELOG.md (the single source of truth).
      # gh then appends the auto-generated "What's Changed" / new contributors / full-changelog link.
      - name: Extract release notes from CHANGELOG
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $changelog = Get-Content -Raw -Path CHANGELOG.md
          # Section = "## [X.Y.Z] …" up to (but excluding) the next "## [" heading or end-of-file.
          $pattern = "(?ms)^##\s*\[$([regex]::Escape($version))\][^\r\n]*\r?\n(.*?)(?=^##\s*\[|\z)"
          $m = [regex]::Match($changelog, $pattern)
          if ($m.Success -and $m.Groups[1].Value.Trim()) {
            $body = $m.Groups[1].Value.Trim()
          } else {
            $body = "See the [changelog](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for details."
            Write-Host "::warning::No CHANGELOG.md section found for $version — falling back to a changelog link."
          }
          $notesPath = Join-Path "${{ github.workspace }}" 'release-notes.md'
          Set-Content -Path $notesPath -Value $body -Encoding utf8
          Write-Host "----- release notes for $version -----"
          Write-Host $body

      - name: Create GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        working-directory: extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create "${{ github.ref_name }}" winforms-designer.vsix
          --title "${{ github.ref_name }}"
          --notes-file "${{ github.workspace }}/release-notes.md"
          --generate-notes

      # Publishing occasionally dies on a transient network reset (read ECONNRESET) against the
      # Marketplace API — retry a few times, and treat an "already published" error as success in
      # case a prior attempt actually landed before the connection dropped.
      - name: Publish to VS Code Marketplace
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if (-not $env:VSCE_PAT) { Write-Host 'VSCE_PAT secret not set - skipping Marketplace publish.'; exit 0 }
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Marketplace publish attempt $i/3..."
            $out = & npx --yes @vscode/vsce publish --packagePath winforms-designer.vsix 2>&1 | Out-String
            Write-Host $out
            if ($LASTEXITCODE -eq 0) { Write-Host 'Published to Marketplace.'; exit 0 }
            if ($out -match 'already exists') { Write-Host 'Version already published - treating as success.'; exit 0 }
            Write-Host "::warning::Marketplace publish attempt $i failed (exit $LASTEXITCODE)."
            if ($i -lt 3) { Start-Sleep -Seconds (15 * $i) }
          }
          Write-Error 'Marketplace publish failed after 3 attempts.'; exit 1

      - name: Publish to Open VSX
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        working-directory: extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if (-not $env:OVSX_PAT) { Write-Host 'OVSX_PAT secret not set - skipping Open VSX publish.'; exit 0 }
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Open VSX publish attempt $i/3..."
            $out = & npx --yes ovsx publish winforms-designer.vsix -p $env:OVSX_PAT 2>&1 | Out-String
            Write-Host $out
            if ($LASTEXITCODE -eq 0) { Write-Host 'Published to Open VSX.'; exit 0 }
            if ($out -match 'already exists') { Write-Host 'Version already published - treating as success.'; exit 0 }
            Write-Host "::warning::Open VSX publish attempt $i failed (exit $LASTEXITCODE)."
            if ($i -lt 3) { Start-Sleep -Seconds (15 * $i) }
          }
          Write-Error 'Open VSX publish failed after 3 attempts.'; exit 1
