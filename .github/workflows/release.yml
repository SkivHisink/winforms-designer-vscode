name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build engine (Release)
        run: dotnet build engine -c Release

      - name: Build sample fixtures
        run: |
          dotnet build samples/CustomControls -c Release
          dotnet build samples/ComplexProject -f net9.0-windows -c Debug

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Typecheck
        working-directory: extension
        run: npm run typecheck

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: End-to-end (headless)
        working-directory: extension
        run: npm run e2e

      # Runs `vscode:prepublish` (build + bundle the engine into extension/engine/ + copy LICENSE).
      - name: Package VSIX
        working-directory: extension
        run: npx --yes @vscode/vsce package --no-dependencies -o winforms-designer.vsix

      - name: Assert VSIX contains the bundled engine
        working-directory: extension
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\winforms-designer.vsix")
          $names = $zip.Entries.FullName
          $zip.Dispose()
          $required = @(
            'extension/engine/WinFormsDesigner.Engine.dll',
            'extension/engine/WinFormsDesigner.Engine.deps.json',
            'extension/engine/WinFormsDesigner.Engine.runtimeconfig.json'
          )
          $missing = @()
          foreach ($r in $required) {
            if ($names -notcontains $r) { $missing += $r }
          }
          if ($missing.Count -gt 0) {
            Write-Error ("VSIX is missing required engine files: " + ($missing -join ', '))
            exit 1
          }
          Write-Host "VSIX contains the bundled engine."

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: winforms-designer-vsix
          path: extension/*.vsix
          if-no-files-found: error

      # The publish/release steps only run for a real tag push (v*).
      - name: Create GitHub Release
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        working-directory: extension
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" winforms-designer.vsix --title "${{ github.ref_name }}" --generate-notes

      - name: Publish to VS Code Marketplace
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        working-directory: extension
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if (-not $env:VSCE_PAT) { Write-Host 'VSCE_PAT secret not set - skipping Marketplace publish.'; exit 0 }
          npx --yes @vscode/vsce publish --packagePath winforms-designer.vsix

      - name: Publish to Open VSX
        if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
        working-directory: extension
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if (-not $env:OVSX_PAT) { Write-Host 'OVSX_PAT secret not set - skipping Open VSX publish.'; exit 0 }
          npx --yes ovsx publish winforms-designer.vsix -p $env:OVSX_PAT
