name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # WinForms is Windows-only, so the engine and e2e must run on Windows.
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build engine (Release)
        run: dotnet build engine -c Release

      # Build the sample fixtures the e2e relies on. Their bin/ output is gitignored,
      # so without this step e2e silently skips the custom-control and multi-target
      # resolver checks on a clean checkout.
      - name: Build sample fixtures
        run: |
          dotnet build samples/CustomControls -c Release
          dotnet build samples/ComplexProject -f net9.0-windows -c Debug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Typecheck
        working-directory: extension
        run: npm run typecheck

      - name: Build extension
        working-directory: extension
        run: npm run build

      - name: Syntax-check webview scripts
        working-directory: extension
        run: |
          node --check media/designer.js
          node --check media/panel.js

      - name: End-to-end (headless)
        working-directory: extension
        run: npm run e2e

      - name: Live-webview tests (headless jsdom)
        working-directory: extension
        run: npm run webview-e2e

      - name: Package VSIX
        # `vsce package` runs the `vscode:prepublish` script, which builds, bundles the engine
        # into extension/engine/, and copies the LICENSE — so the artifact is self-contained.
        working-directory: extension
        run: npx --yes @vscode/vsce package --no-dependencies -o winforms-designer.vsix

      - name: Assert VSIX contains the bundled engine
        working-directory: extension
        run: |
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead("$PWD\winforms-designer.vsix")
          $names = $zip.Entries.FullName
          $zip.Dispose()
          $required = @(
            'extension/engine/WinFormsDesigner.Engine.dll',
            'extension/engine/WinFormsDesigner.Engine.deps.json',
            'extension/engine/WinFormsDesigner.Engine.runtimeconfig.json'
          )
          $missing = @()
          foreach ($r in $required) {
            if ($names -notcontains $r) { $missing += $r }
          }
          if ($missing.Count -gt 0) {
            Write-Error ("VSIX is missing required engine files: " + ($missing -join ', '))
            exit 1
          }
          Write-Host "VSIX contains the bundled engine."

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: winforms-designer-vsix
          path: extension/*.vsix
          if-no-files-found: error
